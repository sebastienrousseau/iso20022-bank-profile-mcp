site_name: iso20022-bank-profile-mcp
site_description: >-
  Local MCP server that manages, validates, and serves bank-specific ISO 20022
  clearing profiles and rule packs — the market-practice layer beyond
  structural XSD validation.
site_url: https://sebastienrousseau.github.io/iso20022-bank-profile-mcp/
repo_url: https://github.com/sebastienrousseau/iso20022-bank-profile-mcp
repo_name: sebastienrousseau/iso20022-bank-profile-mcp
copyright: Copyright &copy; 2023-2026 Sebastien Rousseau — Apache-2.0

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Clearing profiles: profiles.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

plugins:
  - search
